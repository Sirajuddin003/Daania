{% extends 'base.html' %}

{% block content %}
<div class="account-wrapper">
  <div class="account-box">
    <h2>Forgot Password</h2>

    <form method="POST">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Your email">
      <button class="btn-primary">Send Reset Link</button>
    </form>
  </div>
</div>
{% endblock %}
