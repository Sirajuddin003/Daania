{% extends 'base.html' %}

{% block content %}
<div class="account-wrapper dashboard-layout">

  {% include 'includes/dashboard_sidebar.html' %}

  <div class="dashboard-content">
    <p>You can manage your account here.</p>

      <div class="row">
    <main class="col-md-9">
      <article class="card">
        <header class="card-header">
          <strong>Logged in as:</strong> {{ user.full_name }}
        </header>

        <div class="card-body">
          <div class="row">

            <div class="col-md-6">
              <div class="card text-center">
                <div class="card-body">
                  <h5>Total Orders</h5>
                  <h4>{{ orders_count }}</h4>
                  <a href="{% url 'my_orders' %}">View Orders</a>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="card text-center">
                <div class="card-body">
                  <p class="mb-0">{{ user.email }}</p>
                  <p>{{ user.phone_number }}</p>
                </div>
              </div>
            </div>

          </div>
        </div>
      </article>
    </main>
  </div>

  </div>

</div>
{% endblock %}
