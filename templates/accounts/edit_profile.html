{% extends 'base.html' %}

{% block content %}
<div class="account-wrapper dashboard-layout">

  {% include 'includes/dashboard_sidebar.html' %}

  <div class="dashboard-content">
    <h2>Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ user_form.as_p }}
      {{ profile_form.as_p }}
      <button class="btn-primary">Save Changes</button>
    </form>
  </div>

</div>
{% endblock %}
